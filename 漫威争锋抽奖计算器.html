<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽奖问题 · 期望花费计算器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #f7f9fc;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            color: #1e293b;
        }
        .container {
            max-width: 820px;
            width: 100%;
            background: white;
            padding: 2rem 2rem 2.5rem;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            transition: 0.2s;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .subhead {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
            background: #f1f5f9;
            border-radius: 0 8px 8px 0;
            line-height: 1.6;
        }
        .subhead code {
            background: #e2e8f0;
            padding: 0.1rem 0.5rem;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .form-group {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1.5rem 1.5rem 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e9edf2;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem 0.75rem;
            margin-bottom: 0.5rem;
        }
        .form-row label {
            font-weight: 500;
            font-size: 0.9rem;
            color: #334155;
            min-width: 3.5rem;
        }
        .form-row .hint {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-left: 0.25rem;
        }
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 0.6rem 1rem;
            margin-top: 0.75rem;
        }
        .input-item {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }
        .input-item label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            letter-spacing: 0.02em;
            display: flex;
            justify-content: space-between;
        }
        .input-item label small {
            font-weight: 400;
            color: #94a3b8;
        }
        .input-item input {
            padding: 0.45rem 0.6rem;
            border: 1px solid #d1d9e6;
            border-radius: 10px;
            font-size: 0.95rem;
            width: 100%;
            background: white;
            transition: 0.15s;
            font-weight: 500;
        }
        .input-item input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .input-item input.error {
            border-color: #ef4444;
            background: #fef2f2;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin: 0.5rem 0 1rem;
        }
        .btn {
            padding: 0.6rem 1.4rem;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.15s;
            background: #e9edf2;
            color: #1e293b;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn-primary {
            background: #1e293b;
            color: white;
        }
        .btn-primary:hover {
            background: #0f172a;
            transform: scale(0.98);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #d1d9e6;
        }
        .btn-outline:hover {
            background: #f1f5f9;
        }
        .btn-success {
            background: #059669;
            color: white;
        }
        .btn-success:hover {
            background: #047857;
        }
        .result-box {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 1.5rem 1.8rem;
            margin-top: 1.5rem;
            border-left: 6px solid #3b82f6;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.35rem 0;
            border-bottom: 1px dashed #d1d9e6;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-item .label {
            font-weight: 500;
            color: #475569;
        }
        .result-item .value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f172a;
            font-variant-numeric: tabular-nums;
        }
        .result-item .value .unit {
            font-size: 0.9rem;
            font-weight: 400;
            color: #64748b;
            margin-left: 0.3rem;
        }
        .footnote {
            margin-top: 0.8rem;
            font-size: 0.85rem;
            color: #64748b;
            background: #e9edf2;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            display: inline-block;
        }
        .dp-detail {
            margin-top: 1rem;
            font-size: 0.8rem;
            background: #ffffffcc;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            max-height: 200px;
            overflow-y: auto;
            color: #334155;
        }
        .dp-detail code {
            background: #eef2f6;
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        .empty-state {
            color: #94a3b8;
            font-style: italic;
        }
        @media (max-width: 500px) {
            .container { padding: 1.2rem; }
            .input-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
            .result-item .value { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎲 抽奖期望计算</h1>
    <div class="subhead">
        选项 <code>x₀</code> 抽中即结束，其余抽中后移除。<br>
        第 <code>k</code> 次抽奖花费为 <code>cₖ</code>（下标从 0 开始，即 <code>c₀</code> 为第 1 次）。
    </div>

    <!-- 控制区 -->
    <div class="form-group" style="background:white; border-color: transparent; padding-left:0; padding-right:0;">
        <div class="form-row">
            <label for="numN">非结束选项数 <i>n</i></label>
            <input type="number" id="numN" value="2" min="0" max="10" style="width:80px; padding:0.4rem; border-radius:10px; border:1px solid #d1d9e6; text-align:center;">
            <span class="hint">（≤ 10，穷举所有子集）</span>
            <button class="btn btn-outline" id="generateBtn" style="margin-left:auto;">🔄 生成输入框</button>
        </div>
        <div style="font-size:0.8rem; color:#94a3b8; margin-top: 0.2rem;">
            ⚡ 权重 <code>wᵢ</code> 须为正数，<code>w₀</code> 必须 &gt; 0。
        </div>
    </div>

    <!-- 权重 & 花费输入 -->
    <div id="inputFields">
        <!-- 由 JS 动态生成 -->
    </div>

    <div class="btn-group">
        <button class="btn btn-primary" id="calcBtn">📊 计算期望</button>
        <button class="btn btn-outline" id="exampleBtn">📌 加载示例</button>
        <button class="btn btn-outline" id="clearBtn">🗑️ 清空</button>
    </div>

    <!-- 结果 -->
    <div class="result-box" id="resultBox">
        <div class="result-item">
            <span class="label">📈 平均抽奖次数 <code>E[N]</code></span>
            <span class="value" id="expectedDraws">—</span>
        </div>
        <div class="result-item">
            <span class="label">💰 平均花费 <code>E[总花费]</code></span>
            <span class="value" id="expectedCost">—</span>
        </div>
        <div class="footnote" id="statusMsg">等待输入 …</div>
    </div>

    <!-- 详细 DP 调试（可选） -->
    <div style="margin-top:0.5rem;">
        <button class="btn btn-outline" id="toggleDetail" style="font-size:0.8rem; padding:0.2rem 1rem;">📂 显示 DP 子集详情</button>
        <div id="dpDetailContainer" style="display:none; margin-top:0.5rem;">
            <div class="dp-detail" id="dpDetailContent">
                <span class="empty-state">计算后将显示所有子集的期望值</span>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // DOM 元素
        const numNInput = document.getElementById('numN');
        const generateBtn = document.getElementById('generateBtn');
        const calcBtn = document.getElementById('calcBtn');
        const exampleBtn = document.getElementById('exampleBtn');
        const clearBtn = document.getElementById('clearBtn');
        const inputFields = document.getElementById('inputFields');
        const expectedDrawsEl = document.getElementById('expectedDraws');
        const expectedCostEl = document.getElementById('expectedCost');
        const statusMsg = document.getElementById('statusMsg');
        const dpDetailContent = document.getElementById('dpDetailContent');
        const toggleDetailBtn = document.getElementById('toggleDetail');
        const dpDetailContainer = document.getElementById('dpDetailContainer');

        let currentN = 0;
        let dpDetailVisible = false;

        // 辅助：生成输入框
        function generateInputs(n) {
            currentN = n;
            let html = '';

            // 权重区域
            html += `<div class="form-group"><div style="font-weight:600; margin-bottom:0.5rem; font-size:0.95rem;">⚖️ 权重 <code>w₀ ... wₙ</code></div>`;
            html += `<div class="input-grid">`;
            for (let i = 0; i <= n; i++) {
                const label = i === 0 ? 'w₀ (结束)' : `w<sub>${i}</sub>`;
                const placeholder = i === 0 ? '终止权重' : `选项 ${i}`;
                html += `
                    <div class="input-item">
                        <label>${label} <small>${placeholder}</small></label>
                        <input type="number" step="any" min="0.0001" id="w_${i}" value="${i===0 ? '1' : (i===1 ? '2' : (i===2 ? '3' : '1'))}">
                    </div>
                `;
            }
            html += `</div></div>`;

            // 花费区域
            html += `<div class="form-group"><div style="font-weight:600; margin-bottom:0.5rem; font-size:0.95rem;">💸 花费 <code>c₀ ... cₙ</code> <span style="font-weight:400; color:#64748b; font-size:0.8rem;">（cₖ 为第 k+1 次抽奖）</span></div>`;
            html += `<div class="input-grid">`;
            for (let i = 0; i <= n; i++) {
                const drawNum = i + 1;
                const label = `c<sub>${i}</sub>`;
                const placeholder = `第 ${drawNum} 次`;
                html += `
                    <div class="input-item">
                        <label>${label} <small>${placeholder}</small></label>
                        <input type="number" step="any" min="0" id="c_${i}" value="${i===0 ? '10' : (i===1 ? '20' : (i===2 ? '30' : '10'))}">
                    </div>
                `;
            }
            html += `</div></div>`;

            inputFields.innerHTML = html;

            // 清空结果
            expectedDrawsEl.textContent = '—';
            expectedCostEl.textContent = '—';
            statusMsg.textContent = '已生成输入，点击 "计算期望"';
            dpDetailContent.innerHTML = '<span class="empty-state">计算后将显示所有子集的期望值</span>';
            dpDetailContainer.style.display = 'none';
        }

        // 读取权重和花费
        function readInputs(n) {
            const weights = [];
            const costs = [];
            let valid = true;
            for (let i = 0; i <= n; i++) {
                const wEl = document.getElementById(`w_${i}`);
                const cEl = document.getElementById(`c_${i}`);
                if (!wEl || !cEl) { valid = false; continue; }
                const w = parseFloat(wEl.value);
                const c = parseFloat(cEl.value);
                if (isNaN(w) || w <= 0) {
                    wEl.classList.add('error');
                    valid = false;
                } else {
                    wEl.classList.remove('error');
                }
                if (isNaN(c) || c < 0) {
                    cEl.classList.add('error');
                    valid = false;
                } else {
                    cEl.classList.remove('error');
                }
                weights.push(w);
                costs.push(c);
            }
            if (!valid) {
                statusMsg.textContent = '❌ 输入无效：权重必须 > 0，花费 ≥ 0';
                return null;
            }
            if (weights[0] <= 0) {
                document.getElementById('w_0').classList.add('error');
                statusMsg.textContent = '❌ w₀ (终止权重) 必须大于 0';
                return null;
            }
            return { weights, costs };
        }

        // 核心计算
        function compute(n, weights, costs) {
            // 1. 期望抽奖次数：E[N] = 1 + sum_{i=1}^n w_i / (w_0 + w_i)
            let expectedDraws = 1.0;
            for (let i = 1; i <= n; i++) {
                expectedDraws += weights[i] / (weights[0] + weights[i]);
            }

            // 2. 期望花费：动态规划，位掩码表示剩余的非结束选项集合
            const size = 1 << n; // 2^n
            const dp = new Array(size).fill(undefined);
            // popcount
            const popcnt = (mask) => {
                let c = 0;
                while (mask) { c++; mask &= mask - 1; }
                return c;
            };

            // 递归求解
            function solve(mask) {
                if (dp[mask] !== undefined) return dp[mask];
                const drawn = n - popcnt(mask);      // 已经抽出的非结束选项个数
                const drawIdx = drawn;                // 对应 c_drawIdx (0-based)
                // 当前奖池总权重
                let S = weights[0];
                let temp = mask;
                while (temp) {
                    const lsb = temp & -temp;
                    const bitIdx = Math.log2(lsb);    // 0-based bit position
                    const wIdx = bitIdx + 1;          // 对应 weights[1..n]
                    S += weights[wIdx];
                    temp -= lsb;
                }
                // 本次抽奖必须支付 c_drawIdx
                let ans = costs[drawIdx];
                if (mask !== 0) {
                    temp = mask;
                    while (temp) {
                        const lsb = temp & -temp;
                        const bitIdx = Math.log2(lsb);
                        const wIdx = bitIdx + 1;
                        const prob = weights[wIdx] / S;
                        ans += prob * solve(mask ^ lsb);
                        temp -= lsb;
                    }
                }
                dp[mask] = ans;
                return ans;
            }

            const fullMask = (1 << n) - 1;
            const expectedCost = solve(fullMask);

            // 收集 DP 详情 (仅当 n <= 8 时显示全部，否则显示部分)
            let detailStr = '';
            if (n <= 10) {
                const allMasks = [];
                for (let mask = 0; mask < size; mask++) {
                    const val = dp[mask];
                    if (val === undefined) continue;
                    const bits = [];
                    let tmp = mask;
                    while (tmp) {
                        const lsb = tmp & -tmp;
                        const bitIdx = Math.log2(lsb);
                        bits.push(bitIdx + 1);
                        tmp -= lsb;
                    }
                    const setStr = bits.length ? `{${bits.join(', ')}}` : '∅';
                    allMasks.push(`<code>F(${setStr}) = ${val.toFixed(6)}</code>`);
                }
                detailStr = allMasks.join(' &nbsp;| ');
            } else {
                detailStr = '子集数量较多，仅显示最终结果。';
            }

            return { expectedDraws, expectedCost, detail: detailStr };
        }

        // 主计算流程
        function calculate() {
            const n = parseInt(numNInput.value);
            if (isNaN(n) || n < 0 || n > 10) {
                statusMsg.textContent = '❌ n 须为 0 ~ 10 之间的整数';
                return;
            }
            // 确保输入框存在
            const existing = document.getElementById('w_0');
            if (!existing) {
                generateInputs(n);
            }
            // 检查数量是否匹配
            const wEls = document.querySelectorAll('[id^="w_"]');
            if (wEls.length !== n + 1) {
                generateInputs(n);
            }

            const data = readInputs(n);
            if (!data) return;

            const { weights, costs } = data;
            const result = compute(n, weights, costs);
            if (!result) return;

            expectedDrawsEl.textContent = result.expectedDraws.toFixed(6);
            expectedCostEl.textContent = result.expectedCost.toFixed(6);
            statusMsg.textContent = '✅ 计算完成（穷举所有 2ⁿ 种状态）';

            // 更新 DP 详情
            dpDetailContent.innerHTML = result.detail || '<span class="empty-state">无详情</span>';
            if (dpDetailVisible) {
                dpDetailContainer.style.display = 'block';
            }
        }

        // 示例数据
        function loadExample() {
            const n = 2;
            numNInput.value = n;
            generateInputs(n);
            // 修改为示例值
            const wVals = [1, 2, 3];
            const cVals = [10, 20, 30];
            for (let i = 0; i <= n; i++) {
                const wEl = document.getElementById(`w_${i}`);
                const cEl = document.getElementById(`c_${i}`);
                if (wEl) wEl.value = wVals[i];
                if (cEl) cEl.value = cVals[i];
            }
            statusMsg.textContent = '📌 已加载示例 (n=2, w=[1,2,3], c=[10,20,30])';
            expectedDrawsEl.textContent = '—';
            expectedCostEl.textContent = '—';
            dpDetailContent.innerHTML = '<span class="empty-state">点击 "计算期望" 查看结果</span>';
            dpDetailContainer.style.display = 'none';
        }

        // 清空结果
        function clearResults() {
            expectedDrawsEl.textContent = '—';
            expectedCostEl.textContent = '—';
            statusMsg.textContent = '已清空，重新计算吧';
            dpDetailContent.innerHTML = '<span class="empty-state">计算后将显示所有子集的期望值</span>';
            dpDetailContainer.style.display = 'none';
            // 移除所有 error 类
            document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
        }

        // 事件绑定
        generateBtn.addEventListener('click', () => {
            const n = parseInt(numNInput.value);
            if (isNaN(n) || n < 0) { numNInput.value = 0; }
            const val = parseInt(numNInput.value);
            if (val > 10) { numNInput.value = 10; }
            generateInputs(parseInt(numNInput.value));
            clearResults();
        });

        calcBtn.addEventListener('click', calculate);

        exampleBtn.addEventListener('click', () => {
            loadExample();
        });

        clearBtn.addEventListener('click', clearResults);

        toggleDetailBtn.addEventListener('click', () => {
            dpDetailVisible = !dpDetailVisible;
            dpDetailContainer.style.display = dpDetailVisible ? 'block' : 'none';
            toggleDetailBtn.textContent = dpDetailVisible ? '📂 隐藏 DP 子集详情' : '📂 显示 DP 子集详情';
        });

        // 初始加载
        window.addEventListener('DOMContentLoaded', () => {
            generateInputs(2);
            // 稍微修饰示例
            const wVals = [1, 2, 3];
            const cVals = [10, 20, 30];
            for (let i = 0; i <= 2; i++) {
                const wEl = document.getElementById(`w_${i}`);
                const cEl = document.getElementById(`c_${i}`);
                if (wEl) wEl.value = wVals[i];
                if (cEl) cEl.value = cVals[i];
            }
            statusMsg.textContent = '已就绪，点击 "计算期望"';
        });

        // 响应 n 输入回车自动生成
        numNInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                generateBtn.click();
            }
        });
    })();
</script>
</body>
</html>
